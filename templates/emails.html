<!DOCTYPE HTML>
<html>
<body>
  <h2>Email History</h2>
  <table border="1">
    <tr>
      <th>Organization</th>
      <th>Emails</th>
      <th>Content</th>
    </tr>
    {% for log in logs %}
    <tr>
      <td>{{ log.org_name | e }}</td>
      <td>{{ log.emails | e }}</td>
      <!-- The '| e' filter ensures malicious scripts are rendered as safe text -->
      <td><pre>{{ log.content | e }}</pre></td>
    </tr>
    {% endfor %}
  </table>
</body>
</html>
